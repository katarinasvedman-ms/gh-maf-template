<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Run Artifact Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>
  <div class="grain"></div>

  <main class="page">
    <header class="hero card reveal">
      <p class="eyebrow">Demo Dashboard</p>
      <h1>Run Artifact Viewer</h1>
      <p class="subtitle">Scenario-level insights from your latest evaluation run.</p>
      <div class="actions">
        <button id="reload" class="btn">Reload Artifacts</button>
        <label class="file-pick">
          <span>Load report JSON</span>
          <input id="reportFile" type="file" accept="application/json" />
        </label>
        <label class="file-pick">
          <span>Load library JSON</span>
          <input id="libraryFile" type="file" accept="application/json" />
        </label>
      </div>
      <p id="status" class="status">Loading artifacts...</p>
    </header>

    <section class="kpis grid reveal" id="kpis"></section>

    <section class="grid two-col">
      <article class="card reveal">
        <h2>Category Outcomes</h2>
        <div id="categoryTable"></div>
      </article>
      <article class="card reveal">
        <h2>Tool Calls</h2>
        <div id="toolCalls"></div>
      </article>
    </section>

    <section class="card reveal">
      <h2>Scenario Timeline</h2>
      <div id="scenarioList" class="scenario-list"></div>
    </section>

    <section class="grid two-col">
      <article class="card reveal">
        <h2>Workflow Context</h2>
        <div id="workers"></div>
      </article>
      <article class="card reveal">
        <h2>Run Metadata</h2>
        <div id="metadata"></div>
      </article>
    </section>

    <section class="card reveal">
      <h2>Library Report Snapshot</h2>
      <div id="librarySummary"></div>
    </section>

    <section class="card reveal">
      <h2>Library Metrics</h2>
      <div id="libraryMetrics"></div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
